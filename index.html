function baseCd(w,lv){if(['aura','orbit'].includes(w.mode))return .12;if(w.mode==='projectile')return .55;if(w.mode==='chain')return 1.7;if(w.mode==='cloud'||w.mode==='blackhole')return 2.1;if(w.mode==='strike')return 2.5;if(w.mode==='beam')return 2.2;return 1.15}
function dam(m,tag){let d=G.p.damage*m*(G.p.type[tag]||1);if(Math.random()<G.p.crit)d*=G.p.critDmg;if(G.p.greed)d*=1+Math.min(1.6,G.coins*G.p.greed/120);if(G.p.lastStand)d*=1+(1-G.p.hp/G.p.maxHp)*G.p.lastStand;if(G.p.hpDamage)d*=1+Math.min(1.4,G.p.hp/G.p.maxHp*G.p.hpDamage*75);if(G.p.emptyBonus)d*=1+(6-Object.keys(G.weapons).length)*G.p.emptyBonus;return d}
function shoot(a,spd,dmg,type,r,life,area=0,ret=false,x=G.p.x,y=G.p.y){if(G.bullets.length>PERF.bulletCap)return;G.bullets.push({x,y,vx:Math.cos(a)*spd*G.p.projSpeed,vy:Math.sin(a)*spd*G.p.projSpeed,dmg,type,r,life,area,ret,hit:new Set()})}function beam(a,dmg,type){const x2=G.p.x+Math.cos(a)*760,y2=G.p.y+Math.sin(a)*760;G.clouds.push({x:G.p.x,y:G.p.y,r:1,life:.18,max:.18,dmg:0,type:'beam',x2,y2,color:'#ff6f8f'});G.enemies.forEach(e=>{if(lineDist(e.x,e.y,G.p.x,G.p.y,x2,y2)<22)damage(e,dmg,type)})}function zap(n,dmg){let last={x:G.p.x,y:G.p.y};nearList(G.p.range,n).forEach(e=>{damage(e,dmg,'bolt');G.clouds.push({x:last.x,y:last.y,r:1,life:.16,max:.16,dmg:0,type:'beam',x2:e.x,y2:e.y,color:'#7ec8ff'});last=e})}function cloud(x,y,r,life,dmg,type){if(G.clouds.length>PERF.cloudCap)return;G.clouds.push({x,y,r:Math.min(260,r),life,max:life,dmg,type})}function explode(x,y,r,dmg,type){cloud(x,y,r,.25,0,type);G.enemies.forEach(e=>{if(dist(x,y,e.x,e.y)<r+e.r)damage(e,dmg,type)});burst(x,y,'','#ffd66e')}
function updBullets(dt){for(let i=G.bullets.length-1;i>=0;i--){const b=G.bullets[i];if(b.ret&&b.life<.75){const a=Math.atan2(G.p.y-b.y,G.p.x-b.x);b.vx=Math.cos(a)*480;b.vy=Math.sin(a)*480}b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;let rem=b.life<=0;for(const e of G.enemies){if(rem)break;if(b.hit.has(e))continue;if(dist(b.x,b.y,e.x,e.y)<b.r+e.r){b.hit.add(e);damage(e,b.dmg,b.type);if(b.type==='ice'){e.slow=.45-G.p.slowPower*.1;e.freeze=.9}if(b.area){explode(b.x,b.y,b.area,b.dmg*.7,b.type);rem=true}else if(!b.ret)rem=true}}if(Math.abs(b.x-G.p.x)>1200||Math.abs(b.y-G.p.y)>1200)rem=true;if(rem)G.bullets.splice(i,1)}}
function updEnemies(dt){for(let i=G.enemies.length-1;i>=0;i--){const e=G.enemies[i];if(e.freeze>0)e.freeze-=dt;else e.slow+=(1-e.slow)*dt*2;const a=Math.atan2(G.p.y-e.y,G.p.x-e.x);e.x+=Math.cos(a)*e.speed*e.slow*dt;e.y+=Math.sin(a)*e.speed*e.slow*dt;if(dist(G.p.x,G.p.y,e.x,e.y)<G.p.r+e.r){if(G.p.invuln<=0){if(G.p.shield&&G.p.shieldTimer>G.p.shieldMax){G.p.shieldTimer=0;explode(G.p.x,G.p.y,80,G.p.damage*2,'shield')}else G.p.hp-=Math.max(1,e.dmg-G.p.armor)*dt;if(G.p.hp<=0){endGame('小土豆倒下了');return}}}if(e.hp<=0){kill(e);G.enemies.splice(i,1)}}}
function kill(e){G.kills++;G.coins+=Math.ceil((e.boss?18:1)*(1+G.p.goldBonus));addGem(e.x,e.y,e.xp);if(Math.random()<.12+G.p.drop)G.pickups.push({x:e.x,y:e.y,r:13,type:'coin',life:20});if(e.boss){G.bossKills++;G.chests.push({x:e.x,y:e.y,r:24,life:120});burst(e.x,e.y,'Boss宝箱','#ffd66e');if(e.name==='终焉收割者')endGame('通关！')}}
function addGem(x,y,v){G.gems.push({x,y,v,r:6+Math.min(10,v/50),life:999})}function updGems(dt){for(let i=G.gems.length-1;i>=0;i--){const g=G.gems[i],d=dist(G.p.x,G.p.y,g.x,g.y),mag=G.p.magnet*(G.gems.length>60?1.8:1);if(d<mag){const a=Math.atan2(G.p.y-g.y,G.p.x-g.x);g.x+=Math.cos(a)*(180+(mag-d)*5)*dt;g.y+=Math.sin(a)*(180+(mag-d)*5)*dt}if(d<G.p.r+g.r+8){gainXP(g.v);G.gems.splice(i,1)}}for(let i=G.chests.length-1;i>=0;i--){const c=G.chests[i];if(dist(G.p.x,G.p.y,c.x,c.y)<G.p.r+c.r+12){G.chests.splice(i,1);offerChest()}}}
function updPickups(dt){for(let i=G.pickups.length-1;i>=0;i--){const p=G.pickups[i];p.life-=dt;if(dist(G.p.x,G.p.y,p.x,p.y)<G.p.r+p.r+8){if(p.type==='coin')G.coins+=25;else if(p.type==='heal')G.p.hp=G.p.maxHp;else for(let j=0;j<8;j++)gainXP(18);G.pickups.splice(i,1)}else if(p.life<=0)G.pickups.splice(i,1)}}function updProps(dt){for(let i=G.props.length-1;i>=0;i--){const p=G.props[i];if(dist(G.p.x,G.p.y,p.x,p.y)<45){p.hp-=G.p.damage*dt*1.8;if(p.hp<=0){const r=Math.random();G.pickups.push({x:p.x,y:p.y,r:15,type:r<.15?'heal':r<.45?'orb':'coin',life:35});G.props.splice(i,1)}}}}
function updClouds(dt){for(let i=G.clouds.length-1;i>=0;i--){const c=G.clouds[i];c.life-=dt;if(c.dmg)G.enemies.forEach(e=>{if(dist(c.x,c.y,e.x,e.y)<c.r+e.r)damage(e,c.dmg*dt,c.type)});if(c.type==='blackhole')G.enemies.forEach(e=>{const d=dist(c.x,c.y,e.x,e.y);if(d<c.r+120){const a=Math.atan2(c.y-e.y,c.x-e.x);e.x+=Math.cos(a)*90*dt;e.y+=Math.sin(a)*90*dt}});if(c.life<=0)G.clouds.splice(i,1)}}
function updFx(dt){for(let i=G.particles.length-1;i>=0;i--){const p=G.particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)G.particles.splice(i,1)}for(let i=G.texts.length-1;i>=0;i--){const t=G.texts[i];t.y-=28*dt;t.life-=dt;if(t.life<=0)G.texts.splice(i,1)}}
function compress(){if(G.gems.length>PERF.gemCap){let xp=0;G.gems.forEach(g=>xp+=g.v);G.gems=[{x:G.p.x+rand(-80,80),y:G.p.y+rand(-80,80),v:xp,r:18}]}if(G.enemies.length>PERF.enemyCap){G.enemies.sort((a,b)=>dist(G.p.x,G.p.y,b.x,b.y)-dist(G.p.x,G.p.y,a.x,a.y));G.enemies.length=PERF.enemyCap}if(G.bullets.length>PERF.bulletCap)G.bullets.splice(0,G.bullets.length-PERF.bulletCap);if(G.particles.length>PERF.particleCap)G.particles.splice(0,G.particles.length-PERF.particleCap);if(G.clouds.length>PERF.cloudCap)G.clouds.splice(0,G.clouds.length-PERF.cloudCap);if(G.texts.length>PERF.textCap)G.texts.splice(0,G.texts.length-PERF.textCap)}
function damage(e,amt,type){if(e.boss)amt*=1+G.p.bossDmg;e.hp-=amt;if(G.p.lifeSteal)G.p.hp=Math.min(G.p.maxHp,G.p.hp+Math.min(G.p.maxHp*.03,amt*G.p.lifeSteal));if(Math.random()<.018)addText(e.x,e.y,Math.round(amt),C[type]||'#fff')}function near(r=999,x=G.p.x,y=G.p.y){let best=null,bd=999999;G.enemies.forEach(e=>{const d=dist(x,y,e.x,e.y);if(d<r&&d<bd){best=e;bd=d}});return best}function nearList(r,n){return [...G.enemies].sort((a,b)=>dist(G.p.x,G.p.y,a.x,a.y)-dist(G.p.x,G.p.y,b.x,b.y)).slice(0,n)}
function render(){ctx.clearRect(0,0,Wd,Ht);drawMap();drawProps();drawClouds();drawPickups();drawGems();drawBullets();drawEnemies();drawPlayer();drawFx();if(G.state==='paused')overlay('已暂停','点击继续')}function sx(x){return x-G.p.x+Wd/2}function sy(y){return y-G.p.y+Ht/2}function drawMap(){ctx.fillStyle='#111a2d';ctx.fillRect(0,0,Wd,Ht);const tile=64,ox=((-G.p.x%tile)+tile)%tile,oy=((-G.p.y%tile)+tile)%tile;ctx.strokeStyle='rgba(255,255,255,.035)';for(let x=ox-tile;x<Wd+tile;x+=tile){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,Ht);ctx.stroke()}for(let y=oy-tile;y<Ht+tile;y+=tile){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(Wd,y);ctx.stroke()}}
function drawPlayer(){ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(Wd/2,Ht/2+19,24,8,0,0,6.28);ctx.fill();ctx.fillStyle='#d89b58';ctx.strokeStyle='#5b3d26';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(Wd/2,Ht/2,20,25,0,0,6.28);ctx.fill();ctx.stroke();ctx.fillStyle='#111827';ctx.beginPath();ctx.arc(Wd/2-7,Ht/2-4,3,0,6.28);ctx.arc(Wd/2+7,Ht/2-4,3,0,6.28);ctx.fill();if(G.p.invuln>0){ctx.strokeStyle='rgba(126,200,255,.8)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(Wd/2,Ht/2,36+Math.sin(G.t*12)*3,0,6.28);ctx.stroke()}}
function drawEnemies(){G.enemies.forEach(e=>{const x=sx(e.x),y=sy(e.y);if(x<-80||x>Wd+80||y<-80||y>Ht+80)return;ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(x,y+e.r*.8,e.r,5,0,0,6.28);ctx.fill();ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(x,y,e.r,0,6.28);ctx.fill();if(e.boss){ctx.strokeStyle='#ffd66e';ctx.lineWidth=4;ctx.stroke();ctx.fillStyle='#111';ctx.fillRect(x-38,y-e.r-14,76,5);ctx.fillStyle='#ffd66e';ctx.fillRect(x-38,y-e.r-14,76*Math.max(0,e.hp/e.max),5)}})}function drawBullets(){G.bullets.forEach(b=>{ctx.fillStyle=C[b.type]||'#fff';ctx.beginPath();ctx.arc(sx(b.x),sy(b.y),b.r,0,6.28);ctx.fill()})}function drawClouds(){const a=(FX[fxMode]||FX.fade).cloud;G.clouds.forEach(c=>{if(c.type==='beam'){ctx.globalAlpha=.65*a;ctx.strokeStyle=c.color||'#fff';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(sx(c.x),sy(c.y));ctx.lineTo(sx(c.x2),sy(c.y2));ctx.stroke();ctx.globalAlpha=1;return}ctx.globalAlpha=a*Math.max(0,c.life/c.max);ctx.fillStyle=C[c.type]||'#7ec8ff';ctx.beginPath();ctx.arc(sx(c.x),sy(c.y),c.r,0,6.28);ctx.fill();ctx.globalAlpha=1})}function drawGems(){ctx.fillStyle='#7ec8ff';G.gems.forEach(g=>{ctx.beginPath();ctx.arc(sx(g.x),sy(g.y),g.r,0,6.28);ctx.fill()});ctx.fillStyle='#ffd66e';G.chests.forEach(c=>ctx.fillRect(sx(c.x)-14,sy(c.y)-14,28,28))}function drawPickups(){G.pickups.forEach(p=>{ctx.fillStyle=p.type==='heal'?'#89f6b5':p.type==='orb'?'#ca95ff':'#ffd66e';ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),p.r,0,6.28);ctx.fill()})}function drawProps(){ctx.fillStyle='#8a5a33';G.props.forEach(p=>ctx.fillRect(sx(p.x)-12,sy(p.y)-16,24,32))}function drawFx(){G.particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.color;ctx.fillRect(sx(p.x),sy(p.y),3,3);ctx.globalAlpha=1});if(PERF.drawTexts)G.texts.forEach(t=>{ctx.globalAlpha=Math.max(0,t.life/t.max);ctx.fillStyle=t.color;ctx.font='900 12px system-ui';ctx.fillText(t.txt,sx(t.x),sy(t.y));ctx.globalAlpha=1})}function overlay(a,b){ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,Wd,Ht);ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='900 42px system-ui';ctx.fillText(a,Wd/2,Ht/2);ctx.font='16px system-ui';ctx.fillText(b,Wd/2,Ht/2+32)}function burst(x,y,txt,color){for(let i=0;i<Math.floor(16*PERF.fxScale);i++){const a=Math.random()*6.28,s=rand(60,180);G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.5,max:.5,color})}if(txt)addText(x,y-25,txt,color)}function addText(x,y,txt,color){if(!PERF.drawTexts)return;G.texts.push({x,y,txt,color,life:.7,max:.7})}
function updateUI(){UI.time.textContent=fmt(G.t);UI.lv.textContent=G.level;UI.kills.textContent=G.kills;UI.coins.textContent=G.coins;UI.minute.textContent=Math.min(30,Math.floor(G.t/60))+'/30';UI.build.textContent=Object.keys(G.evolved).length?`进化×${Object.keys(G.evolved).length}`:`武器${Object.keys(G.weapons).length}/6 被动${Object.keys(G.passives).length}/6`;UI.hpFill.style.width=Math.max(0,Math.min(100,G.p.hp/G.p.maxHp*100))+'%';UI.xpFill.style.width=Math.max(0,Math.min(100,G.xp/G.need*100))+'%';UI.loadout.innerHTML=[...Object.entries(G.weapons).slice(0,8).map(([id,lv])=>`<span>${weaponName(id)} Lv.${lv}</span>`),...Object.entries(G.passives).slice(0,6).map(([id,lv])=>`<span>${pname(id)} Lv.${lv}</span>`)].join('')}function weaponName(id){return (wby(id)||{}).name||EVONAME[id]||id}function fmt(t){const m=Math.floor(t/60),s=Math.floor(t%60);return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}function rand(a,b){return a+Math.random()*(b-a)}function dist(a,b,c,d){return Math.hypot(a-c,b-d)}function spread(i,n,w){return (i-(n-1)/2)*w}function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function lineDist(px,py,x1,y1,x2,y2){const A=px-x1,B=py-y1,C=x2-x1,D=y2-y1,dot=A*C+B*D,len=C*C+D*D,t=Math.max(0,Math.min(1,dot/len));return dist(px,py,x1+C*t,y1+D*t)}
function initAudio(){if(audioCtx)return;try{audioCtx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}function tone(f,d=.06,type='sine',v=.02){initAudio();if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=audioCtx.currentTime;o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(g);g.connect(bgmGain||audioCtx.destination);o.start(t);o.stop(t+d+.02)}function startBGM(){initAudio();if(!audioCtx||bgmTimer)return;musicEnabled=true;localStorage.setItem('psv3music','on');UI.musicBtn.textContent='音乐开';bgmGain=audioCtx.createGain();bgmGain.gain.value=.3;bgmGain.connect(audioCtx.destination);const scale=[196,233,262,294,330,392,440,523];bgmTimer=setInterval(()=>{const s=bgmStep++%16;if(s%4===0)tone(s<8?98:123,.12,'sawtooth',.025);if(s%2===0)tone(220,.025,'square',.01);tone(scale[(s*3+Math.floor(bgmStep/16))%scale.length],.05,'triangle',.012)},145)}function stopBGM(){if(bgmTimer)clearInterval(bgmTimer);bgmTimer=null;if(bgmGain)try{bgmGain.disconnect()}catch(e){}bgmGain=null;musicEnabled=false;localStorage.setItem('psv3music','off');UI.musicBtn.textContent='音乐关'}function toggleBGM(){musicEnabled&&bgmTimer?stopBGM():startBGM()}function applyFx(){const f=FX[fxMode]||FX.fade;PERF.fxScale=f.fx;PERF.drawTexts=f.text;UI.fxBtn.textContent=f.label;localStorage.setItem('psv3fx',fxMode)}applyFx();function applyStick(){q('joystick').classList.toggle('right',selectedSide==='right');UI.stickBtn.textContent=selectedSide==='right'?'摇杆右':'摇杆左'}applyStick();function toast(s){UI.toast.textContent=s;UI.toast.classList.add('show');setTimeout(()=>UI.toast.classList.remove('show'),1200)}
const joyEl=q('joystick'),stick=q('stick');function js(e){const t=e.changedTouches?e.changedTouches[0]:e;joy.active=true;joy.id=t.identifier??'m';const r=joyEl.getBoundingClientRect();joy.ox=r.left+r.width/2;joy.oy=r.top+r.height/2;jm(e)}function jm(e){if(!joy.active)return;let t=e.changedTouches?[...e.changedTouches].find(x=>x.identifier===joy.id):e;if(!t)return;let dx=t.clientX-joy.ox,dy=t.clientY-joy.oy,d=Math.hypot(dx,dy)||1,m=46;if(d>m){dx=dx/d*m;dy=dy/d*m}joy.dx=dx/m;joy.dy=dy/m;stick.style.transform=`translate(${dx}px,${dy}px)`;e.preventDefault()}function je(){joy.active=false;joy.dx=joy.dy=0;stick.style.transform='translate(0,0)'}joyEl.addEventListener('touchstart',js,{passive:false});joyEl.addEventListener('touchmove',jm,{passive:false});joyEl.addEventListener('touchend',je);joyEl.onmousedown=js;addEventListener('mousemove',jm);addEventListener('mouseup',je);addEventListener('keydown',e=>{keys.add(e.key.toLowerCase());if(e.key===' ')UI.pauseBtn.click()});addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));

function loop(now){const dt=Math.min(.033,(now-G.last)/1000||.016);G.last=now;update(dt);render();requestAnimationFrame(loop)}requestAnimationFrame(loop);
})();
